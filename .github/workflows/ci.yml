name: ci

on:
    pull_request:
    push:
        branches: [main]

# Cancel an older run on the same ref when a newer commit lands. Stops the
# build queue from filling up after a push-after-push.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        runs-on: ubuntu-latest
        # PRIVATE_ADMIN_TOKEN is consumed via $env/static/private at build time;
        # SvelteKit only declares it in its generated types when the var is
        # visible to vite. The value is irrelevant for type-checking — we just
        # need the symbol to exist. The real production token is configured
        # separately as a Cloudflare build-time variable.
        env:
            PRIVATE_ADMIN_TOKEN: ci-typecheck-placeholder
        steps:
            - uses: actions/checkout@v4

            # pnpm version is read from `packageManager` in package.json, so
            # the action-setup step doesn't pin one here (avoids ERR_PNPM_BAD_PM_VERSION).
            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # Generate worker-configuration.d.ts (gitignored) so svelte-check
            # can resolve the `Hyperdrive`, `R2Bucket`, etc. ambient types.
            - name: Generate Cloudflare worker types
              run: pnpm -F capgo-update-lite cf-typegen

            - name: Format check
              run: pnpm format:check

            - name: Lint
              run: pnpm lint

            - name: Type check
              run: pnpm -r check

            - name: Test
              run: pnpm -r test

            - name: Build
              run: pnpm build
